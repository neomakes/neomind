<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1" />
    </linearGradient>

    <!-- Text accent gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>

    <!-- Glow filter for nodes -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for large elements -->
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip path -->
    <clipPath id="bannerClip">
      <rect width="1200" height="300"/>
    </clipPath>

    <!-- Node gradient -->
    <radialGradient id="nodeGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0.4"/>
    </radialGradient>

    <radialGradient id="nodeGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.4"/>
    </radialGradient>

    <!-- Ambient orb gradient -->
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.10"/>
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- Ambient light orbs -->
  <ellipse cx="900" cy="150" rx="320" ry="200" fill="url(#orb1)" clip-path="url(#bannerClip)"/>
  <ellipse cx="100" cy="80" rx="200" ry="150" fill="url(#orb2)" clip-path="url(#bannerClip)"/>

  <!-- Neural network motif (right side) -->
  <g clip-path="url(#bannerClip)" opacity="0.55">

    <!-- Connection edges (drawn first, behind nodes) -->
    <!-- Layer 1 -> Layer 2 -->
    <line x1="860" y1="70"  x2="950" y2="100" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
    <line x1="860" y1="70"  x2="950" y2="160" stroke="#38bdf8" stroke-width="0.8" opacity="0.3"/>
    <line x1="860" y1="150" x2="950" y2="100" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
    <line x1="860" y1="150" x2="950" y2="160" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
    <line x1="860" y1="150" x2="950" y2="220" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
    <line x1="860" y1="230" x2="950" y2="160" stroke="#c084fc" stroke-width="0.8" opacity="0.3"/>
    <line x1="860" y1="230" x2="950" y2="220" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>

    <!-- Layer 2 -> Layer 3 -->
    <line x1="950" y1="100" x2="1050" y2="80"  stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
    <line x1="950" y1="100" x2="1050" y2="150" stroke="#38bdf8" stroke-width="0.8" opacity="0.35"/>
    <line x1="950" y1="160" x2="1050" y2="80"  stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
    <line x1="950" y1="160" x2="1050" y2="150" stroke="#818cf8" stroke-width="0.8" opacity="0.5"/>
    <line x1="950" y1="160" x2="1050" y2="220" stroke="#818cf8" stroke-width="0.8" opacity="0.3"/>
    <line x1="950" y1="220" x2="1050" y2="150" stroke="#c084fc" stroke-width="0.8" opacity="0.35"/>
    <line x1="950" y1="220" x2="1050" y2="220" stroke="#c084fc" stroke-width="0.8" opacity="0.5"/>

    <!-- Layer 3 -> Layer 4 -->
    <line x1="1050" y1="80"  x2="1140" y2="110" stroke="#38bdf8" stroke-width="0.8" opacity="0.45"/>
    <line x1="1050" y1="80"  x2="1140" y2="190" stroke="#38bdf8" stroke-width="0.8" opacity="0.2"/>
    <line x1="1050" y1="150" x2="1140" y2="110" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
    <line x1="1050" y1="150" x2="1140" y2="190" stroke="#818cf8" stroke-width="0.8" opacity="0.4"/>
    <line x1="1050" y1="220" x2="1140" y2="110" stroke="#c084fc" stroke-width="0.8" opacity="0.2"/>
    <line x1="1050" y1="220" x2="1140" y2="190" stroke="#c084fc" stroke-width="0.8" opacity="0.45"/>

    <!-- Layer 1 nodes -->
    <circle cx="860" cy="70"  r="5" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="860" cy="150" r="5" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="860" cy="230" r="5" fill="url(#nodeGrad2)" filter="url(#glow)"/>

    <!-- Layer 2 nodes -->
    <circle cx="950" cy="100" r="5.5" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="950" cy="160" r="5.5" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="950" cy="220" r="5.5" fill="url(#nodeGrad2)" filter="url(#glow)"/>

    <!-- Layer 3 nodes -->
    <circle cx="1050" cy="80"  r="5" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="1050" cy="150" r="6" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="1050" cy="220" r="5" fill="url(#nodeGrad2)" filter="url(#glow)"/>

    <!-- Layer 4 output nodes -->
    <circle cx="1140" cy="110" r="6" fill="url(#nodeGrad1)" filter="url(#glow)"/>
    <circle cx="1140" cy="190" r="6" fill="url(#nodeGrad2)" filter="url(#glow)"/>
  </g>

  <!-- Faint left-side geometric accent (triangle / pyramid) -->
  <g opacity="0.08" clip-path="url(#bannerClip)">
    <polygon points="60,260 160,40 260,260" fill="none" stroke="#818cf8" stroke-width="1.5"/>
    <polygon points="80,260 160,60 240,260" fill="none" stroke="#38bdf8" stroke-width="0.8"/>
  </g>

  <!-- Horizontal separator line with gradient -->
  <line x1="80" y1="212" x2="720" y2="212" stroke="url(#textGrad)" stroke-width="0.8" opacity="0.35"/>

  <!-- Main title: human-wm -->
  <text
    x="80"
    y="168"
    font-family="'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="700"
    letter-spacing="-3"
    fill="url(#textGrad)"
    filter="url(#softGlow)"
  >human-wm</text>

  <!-- Subtitle: Human World Model -->
  <text
    x="83"
    y="248"
    font-family="'SF Pro Text', 'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="6"
    fill="#8b9ab0"
  >HUMAN WORLD MODEL</text>

  <!-- Subtle top border glow line -->
  <rect x="0" y="0" width="1200" height="1.5" fill="url(#textGrad)" opacity="0.4"/>
  <!-- Subtle bottom border glow line -->
  <rect x="0" y="298.5" width="1200" height="1.5" fill="url(#textGrad)" opacity="0.2"/>
</svg>
